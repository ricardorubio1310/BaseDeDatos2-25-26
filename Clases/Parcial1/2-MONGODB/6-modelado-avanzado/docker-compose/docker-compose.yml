version: "3.8"

services:

  mongodb_docencia:
    image: mongo:7
    container_name: mongodb_docencia
    restart: always

    command: mongod --replSet rs0 --bind_ip_all

    ports:
      - "27017:27017"

    volumes:
      - mongo_data_docencia:/data/db

  mongo_init_docencia:
    image: mongo:7
    container_name: mongo_init_docencia

    depends_on:
      - mongodb_docencia

    entrypoint: >
      bash -c "
      sleep 5 &&
      mongosh --host mongodb_docencia:27017 --eval '
      rs.initiate({
        _id: \"rs0\",
        members: [{ _id: 0, host: \"mongodb_docencia:27017\" }]
      })
      '
      "

  mongosh_docencia:
    image: mongo:7
    container_name: mongosh_docencia
    entrypoint: ["sleep","infinity"]

    depends_on:
      - mongodb_docencia

volumes:
  mongo_data_docencia: